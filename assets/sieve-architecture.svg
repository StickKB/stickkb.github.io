<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Sieve public architecture overview</title>
  <desc id="desc">Capture flows into semantic units, review packets, approved knowledge graph, and Ask Sieve retrieval with source evidence.</desc>
  <rect width="920" height="560" fill="#f7faf9"/>
  <rect x="34" y="34" width="852" height="492" rx="8" fill="#ffffff" stroke="#d9dee7" stroke-width="2"/>
  <text x="64" y="82" fill="#1f2733" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="30" font-weight="800">Sieve architecture</text>
  <text x="64" y="112" fill="#647184" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="16">Review-gated AI memory with source evidence and graph-backed retrieval.</text>

  <g font-family="IBM Plex Sans, Inter, Arial, sans-serif">
    <rect x="64" y="164" width="128" height="94" rx="8" fill="#e8f3f1" stroke="#166c5f" stroke-width="2"/>
    <text x="91" y="201" fill="#0e4e45" font-size="18" font-weight="800">Capture</text>
    <text x="86" y="226" fill="#647184" font-size="13" font-weight="600">notes, DMs, files</text>

    <rect x="232" y="164" width="136" height="94" rx="8" fill="#edf2ff" stroke="#355fc7" stroke-width="2"/>
    <text x="254" y="201" fill="#274493" font-size="18" font-weight="800">Semantic Units</text>
    <text x="258" y="226" fill="#647184" font-size="13" font-weight="600">meaning before cards</text>

    <rect x="408" y="164" width="136" height="94" rx="8" fill="#fff7e8" stroke="#b7791f" stroke-width="2"/>
    <text x="432" y="201" fill="#865711" font-size="18" font-weight="800">Review Packet</text>
    <text x="437" y="226" fill="#647184" font-size="13" font-weight="600">approve or correct</text>

    <rect x="584" y="164" width="136" height="94" rx="8" fill="#f1f4f8" stroke="#647184" stroke-width="2"/>
    <text x="610" y="201" fill="#1f2733" font-size="18" font-weight="800">Knowledge Graph</text>
    <text x="615" y="226" fill="#647184" font-size="13" font-weight="600">records and links</text>

    <rect x="760" y="164" width="96" height="94" rx="8" fill="#e8f3f1" stroke="#166c5f" stroke-width="2"/>
    <text x="779" y="201" fill="#0e4e45" font-size="18" font-weight="800">Ask Sieve</text>
    <text x="781" y="226" fill="#647184" font-size="13" font-weight="600">cited recall</text>
  </g>

  <g stroke="#647184" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M198 211h26"/>
    <path d="M374 211h26"/>
    <path d="M550 211h26"/>
    <path d="M726 211h26"/>
  </g>
  <g fill="#647184">
    <path d="M224 211l-9-6v12z"/>
    <path d="M400 211l-9-6v12z"/>
    <path d="M576 211l-9-6v12z"/>
    <path d="M752 211l-9-6v12z"/>
  </g>

  <g font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="14">
    <rect x="80" y="318" width="220" height="120" rx="8" fill="#fbfcfe" stroke="#d9dee7"/>
    <text x="104" y="350" fill="#1f2733" font-size="17" font-weight="800">Data quality guardrails</text>
    <text x="104" y="378" fill="#647184">Raw capture is preserved.</text>
    <text x="104" y="404" fill="#647184">Secrets are blocked before storage.</text>
    <text x="104" y="430" fill="#647184">Source evidence stays attached.</text>

    <rect x="350" y="318" width="220" height="120" rx="8" fill="#fbfcfe" stroke="#d9dee7"/>
    <text x="374" y="350" fill="#1f2733" font-size="17" font-weight="800">Typed memory records</text>
    <text x="374" y="378" fill="#647184">Notes, WorkItems, Resources.</text>
    <text x="374" y="404" fill="#647184">Topics, Tags, Reminders.</text>
    <text x="374" y="430" fill="#647184">Knowledge Links and Areas.</text>

    <rect x="620" y="318" width="220" height="120" rx="8" fill="#fbfcfe" stroke="#d9dee7"/>
    <text x="644" y="350" fill="#1f2733" font-size="17" font-weight="800">Retrieval evidence</text>
    <text x="644" y="378" fill="#647184">Approved knowledge by default.</text>
    <text x="644" y="404" fill="#647184">Citations and graph context.</text>
    <text x="644" y="430" fill="#647184">Feedback improves recall.</text>
  </g>

  <rect x="226" y="470" width="468" height="38" rx="8" fill="#1f2733"/>
  <text x="266" y="495" fill="#ffffff" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="15" font-weight="800">Default trust boundary: suggested memory changes go through Review</text>
</svg>

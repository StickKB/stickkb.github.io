<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Convoy public architecture overview</title>
  <desc id="desc">iPhone client connects to session backend, realtime map state, MapKit guidance, LiveKit Talk, and privacy guardrails.</desc>
  <rect width="920" height="560" fill="#0A0B0F"/>
  <rect x="34" y="34" width="852" height="492" rx="12" fill="#12131A" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="64" y="82" fill="#EDEDF0" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Convoy architecture</text>
  <text x="64" y="112" fill="#8B8D98" font-family="Inter, Arial, sans-serif" font-size="16">Private small-group coordination with live map state, lightweight guidance, and active in-app Talk.</text>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <rect x="64" y="160" width="140" height="106" rx="10" fill="rgba(16,185,129,0.10)" stroke="#10B981" stroke-width="1.5"/>
    <text x="134" y="203" fill="#34D399" font-size="17" font-weight="700">iPhone App</text>
    <text x="134" y="232" fill="#8B8D98" font-size="12.5" font-weight="500">SwiftUI and MapKit</text>

    <rect x="224" y="160" width="140" height="106" rx="10" fill="rgba(59,130,246,0.10)" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="294" y="203" fill="#60A5FA" font-size="17" font-weight="700">Session API</text>
    <text x="294" y="232" fill="#8B8D98" font-size="12.5" font-weight="500">create and join</text>

    <rect x="384" y="160" width="140" height="106" rx="10" fill="rgba(245,158,11,0.10)" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="454" y="195" fill="#FBBF24" font-size="17" font-weight="700">Realtime</text>
    <text x="454" y="215" fill="#FBBF24" font-size="17" font-weight="700">State</text>
    <text x="454" y="242" fill="#8B8D98" font-size="12.5" font-weight="500">map and presence</text>

    <rect x="544" y="160" width="140" height="106" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <text x="614" y="203" fill="#EDEDF0" font-size="17" font-weight="700">Guidance</text>
    <text x="614" y="232" fill="#8B8D98" font-size="12.5" font-weight="500">route, ETA, handoff</text>

    <rect x="704" y="160" width="140" height="106" rx="10" fill="rgba(124,92,252,0.10)" stroke="#7C5CFC" stroke-width="1.5"/>
    <text x="774" y="203" fill="#9178FF" font-size="17" font-weight="700">Talk</text>
    <text x="774" y="232" fill="#8B8D98" font-size="12.5" font-weight="500">LiveKit room</text>
  </g>

  <g stroke="#5C5E6A" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M210 213h8"/>
    <path d="M370 213h8"/>
    <path d="M530 213h8"/>
    <path d="M690 213h8"/>
  </g>
  <g fill="#5C5E6A">
    <path d="M218 213l-9-6v12z"/>
    <path d="M378 213l-9-6v12z"/>
    <path d="M538 213l-9-6v12z"/>
    <path d="M698 213l-9-6v12z"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="13.2">
    <rect x="80" y="316" width="220" height="140" rx="10" fill="#12131A" stroke="rgba(255,255,255,0.06)"/>
    <text x="104" y="342" fill="#EDEDF0" font-size="15" font-weight="700">Private session</text>
    <text x="104" y="361" fill="#EDEDF0" font-size="15" font-weight="700">boundary</text>
    <text x="104" y="389" fill="#8B8D98">Same-convoy access.</text>
    <text x="104" y="415" fill="#8B8D98">Short code/deep link join.</text>
    <text x="104" y="441" fill="#8B8D98">End convoy stops sharing.</text>

    <rect x="350" y="316" width="220" height="140" rx="10" fill="#12131A" stroke="rgba(255,255,255,0.06)"/>
    <text x="374" y="342" fill="#EDEDF0" font-size="15" font-weight="700">Map and</text>
    <text x="374" y="361" fill="#EDEDF0" font-size="15" font-weight="700">destination state</text>
    <text x="374" y="389" fill="#8B8D98">Car freshness and accuracy.</text>
    <text x="374" y="415" fill="#8B8D98">Shared destination route.</text>
    <text x="374" y="441" fill="#8B8D98">ETA and maneuver context.</text>

    <rect x="620" y="316" width="220" height="140" rx="10" fill="#12131A" stroke="rgba(255,255,255,0.06)"/>
    <text x="644" y="342" fill="#EDEDF0" font-size="15" font-weight="700">Privacy</text>
    <text x="644" y="361" fill="#EDEDF0" font-size="15" font-weight="700">guardrails</text>
    <text x="644" y="389" fill="#8B8D98">Contextual permissions.</text>
    <text x="644" y="415" fill="#8B8D98">No default location history.</text>
    <text x="644" y="441" fill="#8B8D98">No recorded Convoy audio.</text>
  </g>

  <rect x="190" y="474" width="540" height="48" rx="10" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <g fill="#8B8D98" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">
    <text x="460" y="496">Default trust boundary: sharing exists only</text>
    <text x="460" y="515">inside an active private convoy</text>
  </g>
</svg>

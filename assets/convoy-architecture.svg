<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Convoy public architecture overview</title>
  <desc id="desc">iPhone client connects to session backend, realtime map state, MapKit guidance, LiveKit Talk, and privacy guardrails.</desc>
  <rect width="920" height="560" fill="#f8fafc"/>
  <rect x="34" y="34" width="852" height="492" rx="8" fill="#ffffff" stroke="#d9dee7" stroke-width="2"/>
  <text x="64" y="82" fill="#1f2733" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="30" font-weight="800">Convoy architecture</text>
  <text x="64" y="112" fill="#647184" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="16">Private small-group coordination with live map state, lightweight guidance, and active in-app Talk.</text>

  <g font-family="IBM Plex Sans, Inter, Arial, sans-serif">
    <rect x="64" y="164" width="136" height="94" rx="8" fill="#e8f3f1" stroke="#166c5f" stroke-width="2"/>
    <text x="89" y="201" fill="#0e4e45" font-size="18" font-weight="800">iPhone App</text>
    <text x="87" y="226" fill="#647184" font-size="13" font-weight="600">SwiftUI and MapKit</text>

    <rect x="240" y="164" width="136" height="94" rx="8" fill="#edf2ff" stroke="#355fc7" stroke-width="2"/>
    <text x="266" y="201" fill="#274493" font-size="18" font-weight="800">Session API</text>
    <text x="264" y="226" fill="#647184" font-size="13" font-weight="600">create and join</text>

    <rect x="416" y="164" width="136" height="94" rx="8" fill="#fff7e8" stroke="#b7791f" stroke-width="2"/>
    <text x="442" y="201" fill="#865711" font-size="18" font-weight="800">Realtime State</text>
    <text x="449" y="226" fill="#647184" font-size="13" font-weight="600">map and presence</text>

    <rect x="592" y="164" width="136" height="94" rx="8" fill="#f1f4f8" stroke="#647184" stroke-width="2"/>
    <text x="617" y="201" fill="#1f2733" font-size="18" font-weight="800">Guidance</text>
    <text x="615" y="226" fill="#647184" font-size="13" font-weight="600">route, ETA, handoff</text>

    <rect x="768" y="164" width="88" height="94" rx="8" fill="#e8f3f1" stroke="#166c5f" stroke-width="2"/>
    <text x="785" y="201" fill="#0e4e45" font-size="18" font-weight="800">Talk</text>
    <text x="785" y="226" fill="#647184" font-size="13" font-weight="600">LiveKit room</text>
  </g>

  <g stroke="#647184" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M206 211h26"/>
    <path d="M382 211h26"/>
    <path d="M558 211h26"/>
    <path d="M734 211h26"/>
  </g>
  <g fill="#647184">
    <path d="M232 211l-9-6v12z"/>
    <path d="M408 211l-9-6v12z"/>
    <path d="M584 211l-9-6v12z"/>
    <path d="M760 211l-9-6v12z"/>
  </g>

  <g font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="14">
    <rect x="80" y="318" width="220" height="120" rx="8" fill="#fbfcfe" stroke="#d9dee7"/>
    <text x="104" y="350" fill="#1f2733" font-size="17" font-weight="800">Private session boundary</text>
    <text x="104" y="378" fill="#647184">Sign in and same-convoy access.</text>
    <text x="104" y="404" fill="#647184">Short code or deep link join.</text>
    <text x="104" y="430" fill="#647184">End convoy stops sharing.</text>

    <rect x="350" y="318" width="220" height="120" rx="8" fill="#fbfcfe" stroke="#d9dee7"/>
    <text x="374" y="350" fill="#1f2733" font-size="17" font-weight="800">Map and destination state</text>
    <text x="374" y="378" fill="#647184">Car colors, freshness, accuracy.</text>
    <text x="374" y="404" fill="#647184">Shared destination and route.</text>
    <text x="374" y="430" fill="#647184">ETA and next maneuver context.</text>

    <rect x="620" y="318" width="220" height="120" rx="8" fill="#fbfcfe" stroke="#d9dee7"/>
    <text x="644" y="350" fill="#1f2733" font-size="17" font-weight="800">Privacy guardrails</text>
    <text x="644" y="378" fill="#647184">Contextual permissions.</text>
    <text x="644" y="404" fill="#647184">No location history by default.</text>
    <text x="644" y="430" fill="#647184">No recorded Convoy audio.</text>
  </g>

  <rect x="210" y="470" width="500" height="38" rx="8" fill="#1f2733"/>
  <text x="257" y="495" fill="#ffffff" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="15" font-weight="800">Default trust boundary: sharing exists only inside an active private convoy</text>
</svg>
